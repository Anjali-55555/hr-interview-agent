version: '3.8'

services:
  # HTTPS Reverse Proxy (Caddy) - Handles HTTPS for microphone access
  caddy:
    image: caddy:alpine
    container_name: hr-interview-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hr-network
    depends_on:
      - frontend
      - app

  # Backend API
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-interview-api
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/hr_interview_agent
      - JWT_SECRET=${JWT_SECRET:-defaultsecretfordevelopment123456789}
      - OPENAI_API_KEY=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
      - FRONTEND_URL=https://localhost
      - PORT=5000
    depends_on:
      - mongo
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - hr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # MongoDB Database
  mongo:
    image: mongo:6
    container_name: hr-interview-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hr-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # MongoDB Admin UI
  mongo-express:
    image: mongo-express:latest
    container_name: hr-interview-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - hr-network

  # Frontend (Nginx serving static files)
  frontend:
    image: nginx:alpine
    container_name: hr-interview-frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hr-network

volumes:
  mongo_data:
  caddy_data:
  caddy_config:

networks:
  hr-network:
    driver: bridge